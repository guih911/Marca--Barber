# ═══════════════════════════════════════════════════════════════════════════════
# Nginx — Marcaí Barber
# Domínio: barber.marcaí.com
# ═══════════════════════════════════════════════════════════════════════════════

# ── HTTP: redireciona para HTTPS + responde ao desafio do Certbot ─────────────
server {
    listen 80;
    server_name barber.marcaí.com barber.xn--marc-gqa.com;

    # Desafio Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tudo o mais → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name barber.marcaí.com barber.xn--marc-gqa.com;

    # Certificado Let's Encrypt (gerado pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/barber.marcaí.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barber.marcaí.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Cabeçalhos de segurança
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Tamanho máximo de upload (fotos de galeria, avatares)
    client_max_body_size 20M;

    # ── API (proxy para container marcai-api) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://marcai-api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout maior para operações longas (QR do WhatsApp, IA, etc.)
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;
    }

    # ── Uploads (fotos, avatares) ─────────────────────────────────────────────
    location /uploads/ {
        proxy_pass       http://marcai-api:3001;
        proxy_set_header Host $host;

        # Cache de imagens no browser por 7 dias
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Frontend React SPA ────────────────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        # Suporte ao React Router (client-side routing)
        try_files  $uri $uri/ /index.html;

        # Cache agressivo para assets com hash no nome (gerados pelo Vite)
        location ~* \.(js|css|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cache moderado para imagens estáticas
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }
}
