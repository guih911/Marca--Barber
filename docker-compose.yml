# ═══════════════════════════════════════════════════════════════════════════════
# Marcaí Barber — Docker Compose (Produção)
# Domínio: barber.marcaí.com
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Banco de dados ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interno

  # ── API (Node.js + Prisma + Puppeteer/WhatsApp) ──────────────────────────────
  marcai-api:
    build:
      context: ./marcaí-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:                postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV:                    production
      PORT:                        3001
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH:   /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # ⚠️  CRÍTICO: sessões WhatsApp — NUNCA delete este volume
      # Cada tenant tem sua sessão persistida aqui. Sem ele, todos
      # os clientes precisarão escanear o QR code novamente.
      - wwebjs_auth:/app/.wwebjs_auth
      # Cache do Chromium (evita re-download a cada restart)
      - wwebjs_cache:/app/.wwebjs_cache
      # Uploads (fotos de galeria, avatares de profissionais)
      - uploads:/app/uploads
    expose:
      - "3001"
    networks:
      - interno
    # Memória compartilhada maior para o Chromium/Puppeteer
    shm_size: 512mb

  # ── Frontend + Nginx (serve React e faz proxy da API) ───────────────────────
  marcai-web:
    build:
      context: ./marcaí-web
      dockerfile: Dockerfile
      args:
        # Vazio = usa URLs relativas /api/... que o nginx redireciona
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - marcai-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - interno

  # ── Certbot (renovação automática SSL Let's Encrypt) ─────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renova o certificado a cada 12 horas (Let's Encrypt renova quando falta < 30 dias)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet;
          sleep 12h & wait $${!};
        done"

# ── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  postgres_data:    # Dados do banco
  wwebjs_auth:      # ⚠️  Sessões WhatsApp — backup recomendado
  wwebjs_cache:     # Cache Chromium
  uploads:          # Fotos e avatares
  certbot_www:      # Desafio HTTP do Let's Encrypt
  certbot_conf:     # Certificados SSL

# ── Redes ────────────────────────────────────────────────────────────────────
networks:
  interno:
    driver: bridge
