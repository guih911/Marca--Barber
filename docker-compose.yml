# ═══════════════════════════════════════════════════════════════════════════════
# Marcaí Barber — Docker Compose (Produção)
# Domínio: barber.marcaí.com (via Caddy do SoloFlow)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Banco de dados ───────────────────────────────────────────────────────────
  marcai-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - marcai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soloflow-net

  # ── API (Node.js + Prisma + Baileys) ───────────────────────────────────────
  marcai-api:
    build:
      context: ./marcaí-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@marcai-postgres:5432/${POSTGRES_DB}
      NODE_ENV:      production
      PORT:          3001
    depends_on:
      marcai-postgres:
        condition: service_healthy
    volumes:
      - marcai_baileys_auth:/app/.baileys_auth
      - marcai_uploads:/app/uploads
    expose:
      - "3001"
    networks:
      - soloflow-net

  # ── Frontend (build React → servido pelo Caddy do SoloFlow) ────────────────
  marcai-web:
    build:
      context: ./marcaí-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - marcai-api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - soloflow-net

# ── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  marcai_postgres_data:
  marcai_baileys_auth:
  marcai_uploads:

# ── Rede externa (compartilhada com SoloFlow) ───────────────────────────────
networks:
  soloflow-net:
    external: true
