services:
  marcai-admin-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL obrigatoria}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET obrigatoria}
      MAIN_JWT_SECRET: ${MAIN_JWT_SECRET:?MAIN_JWT_SECRET obrigatoria}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-http://localhost:5174}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID:-}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v22.0}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
      META_SYSTEM_USER_TOKEN: ${META_SYSTEM_USER_TOKEN:-}
      PORT: 4000
    command: sh -c "npx prisma generate && npx prisma migrate deploy && node src/server.js"
    expose:
      - "4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - soloflow-net

  marcai-admin-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_ADMIN_API_URL: ""
    restart: unless-stopped
    depends_on:
      - marcai-admin-api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - soloflow-net

networks:
  soloflow-net:
    external: true
